name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Verify version matches tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # Strip dev+sha suffix before comparing
          PKG_VERSION=$(python3 -c "import jarvis; print(jarvis.__version__.split('-')[0])")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag $TAG does not match package version $PKG_VERSION"
            exit 1
          fi

      - name: Run tests
        run: uv run pytest -v

      - name: Build shiv artifact
        run: |
          uv run python -m pip install --quiet shiv
          uv run bash scripts/build_shiv.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/jarvis-*.pyz
          generate_release_notes: true
