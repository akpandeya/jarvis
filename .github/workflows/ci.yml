name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Version consistency
        run: |
          TOML_VER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          # Strip dev suffix (e.g. "0.2.0-dev+abc1234" → "0.2.0") before comparing
          PKG_VER=$(uv run python -c "import jarvis; print(jarvis.__version__.split('-')[0])")
          if [ "$TOML_VER" != "$PKG_VER" ]; then
            echo "Version mismatch: pyproject.toml=$TOML_VER jarvis/__init__.py=$PKG_VER"
            exit 1
          fi

      - name: Tests
        run: uv run pytest -v
