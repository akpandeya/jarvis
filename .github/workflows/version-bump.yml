name: Version Bump

on:
  push:
    branches: ["main"]

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip if this push is itself a version bump commit (avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type from merged branch name
        id: bump_type
        run: |
          # Read from git log to avoid shell-quoting issues with commit message content
          COMMIT_MSG=$(git log -1 --format=%B)
          # Squash merges include the branch name in the commit message
          BRANCH=$(echo "$COMMIT_MSG" | grep -oP '\b(feat|fix|patch|major|breaking)/[^\s\n]+' | head -1 || true)

          echo "Detected branch hint: $BRANCH"

          if echo "$BRANCH" | grep -qP '^(major|breaking)/'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$BRANCH" | grep -qP '^feat/'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute new version
        id: versions
        run: |
          BUMP="${{ steps.bump_type.outputs.type }}"
          CURRENT=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP" = "major" ]; then
            NEW="$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEW="${MAJOR}.$((MINOR + 1)).0"
          else
            NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "Bumping $CURRENT → $NEW ($BUMP)"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        run: |
          CURRENT="${{ steps.versions.outputs.current }}"
          NEW="${{ steps.versions.outputs.new }}"
          sed -i "s/^version = \"${CURRENT}\"/version = \"${NEW}\"/" pyproject.toml
          sed -i "s/^__version__ = \"${CURRENT}\"/__version__ = \"${NEW}\"/" jarvis/__init__.py

      - name: Open PR for version bump
        run: |
          NEW="${{ steps.versions.outputs.new }}"
          BRANCH="chore/bump-version-${NEW}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add pyproject.toml jarvis/__init__.py
          git commit -m "chore: bump version to ${NEW}"
          git push origin "$BRANCH"
          # Ensure chore label exists
          gh label create chore --color "#ededed" --description "Maintenance tasks" 2>/dev/null || true
          PR_URL=$(gh pr create \
            --title "chore: bump version to ${NEW}" \
            --body "Automatic version bump triggered by merge to main." \
            --base main \
            --head "$BRANCH" \
            --label "chore")
          # Enable auto-merge so it lands once CI passes
          gh pr merge "$PR_URL" --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
