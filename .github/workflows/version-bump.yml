name: Version Bump

on:
  push:
    branches: ["main"]

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip if this push is itself a version bump commit (avoid infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type from merged branch name
        id: bump_type
        run: |
          # Get the branch name from the merge commit message or PR refs
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          # GitHub squash merges include "feat/branch-name" in the commit message
          BRANCH=$(echo "$COMMIT_MSG" | grep -oP '(?<=from )[^\s]+' | head -1 || true)
          # Also try the PR head ref stored in the commit message body
          if [ -z "$BRANCH" ]; then
            BRANCH=$(echo "$COMMIT_MSG" | grep -oP '\b(feat|fix|patch|major|breaking)/[^\s]+' | head -1 || true)
          fi

          echo "Detected branch hint: $BRANCH"

          if echo "$BRANCH" | grep -qP '^(major|breaking)/'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$BRANCH" | grep -qP '^feat/'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            # Default: patch (covers fix/, patch/, and anything else)
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        run: |
          BUMP="${{ steps.bump_type.outputs.type }}"
          CURRENT=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "$BUMP" = "major" ]; then
            NEW="$((MAJOR + 1)).0.0"
          elif [ "$BUMP" = "minor" ]; then
            NEW="${MAJOR}.$((MINOR + 1)).0"
          else
            NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "Bumping $CURRENT → $NEW ($BUMP)"

          # Update pyproject.toml
          sed -i "s/^version = \"${CURRENT}\"/version = \"${NEW}\"/" pyproject.toml

          # Update jarvis/__init__.py (the hardcoded base version line)
          sed -i "s/^__version__ = \"${CURRENT}\"/__version__ = \"${NEW}\"/" jarvis/__init__.py

          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml jarvis/__init__.py
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
