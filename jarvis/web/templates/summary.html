{% extends "base.html" %}
{% set active = "summary" %}
{% block title %}Summary{% endblock %}
{% block content %}
<h2>Summary</h2>

<form class="filters">
    <select name="kind" id="kind">
        <option value="standup" {% if kind == "standup" %}selected{% endif %}>Standup</option>
        <option value="weekly" {% if kind == "weekly" %}selected{% endif %}>Weekly</option>
        <option value="context" {% if kind == "context" %}selected{% endif %}>Context</option>
    </select>
    <select name="days" id="days">
        {% for d in [1, 3, 7, 14, 30] %}
        <option value="{{ d }}" {% if days == d %}selected{% endif %}>Last {{ d }} days</option>
        {% endfor %}
    </select>
    <button type="button"
            hx-get="/api/summary"
            hx-include="#kind, #days"
            hx-target="#summary-output"
            hx-indicator="#loading">
        Generate
    </button>
</form>

<div id="loading" class="loading htmx-indicator">Generating with Claude...</div>

<article id="summary-output" class="summary-content">
    <p class="event-meta">Click "Generate" to create a summary using Claude.</p>
</article>
{% endblock %}
