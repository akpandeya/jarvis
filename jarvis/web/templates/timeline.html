{% extends "base.html" %}
{% set active = "timeline" %}
{% block title %}Timeline{% endblock %}
{% block content %}
<div id="suggestions-widget"
     hx-get="/api/suggestions"
     hx-trigger="load, every 60s"
     hx-target="this"
     hx-swap="innerHTML">
</div>

<script>
  document.addEventListener("htmx:afterSwap", function(e) {
    if (e.target.id !== "suggestions-widget") return;
    var data = [];
    try { data = JSON.parse(e.detail.xhr.responseText); } catch(_) { return; }
    if (!data.length) { e.target.innerHTML = ""; return; }
    var top = data[0];
    var actionHtml;
    if (top.rule_id === 'stale_ingest') {
      // Header already has a Run Ingest button — just show the message
      actionHtml = '';
    } else {
      actionHtml = ' &nbsp;<code>' + top.action + '</code>';
    }
    e.target.innerHTML =
      '<aside style="border-left:3px solid var(--pico-primary);padding:.5rem 1rem;margin-bottom:1rem;background:var(--pico-card-background-color)">' +
      '<strong>💡 ' + top.message + '</strong>' +
      actionHtml +
      '</aside>';
    htmx.process(e.target);
  });
</script>

<h2>Timeline <small>({{ total }} events)</small>
  <button id="ingest-btn"
          hx-post="/api/ingest"
          hx-target="#ingest-output"
          hx-swap="innerHTML"
          hx-on:htmx:before-request="this.disabled=true; this.textContent='⏳ Ingesting…'"
          hx-on:htmx:after-request="this.disabled=false; this.textContent='↻ Run Ingest'"
          hx-on:htmx:after-settle="setTimeout(() => location.reload(), 1500)"
          style="font-size:.75rem;padding:.25rem .75rem;margin-left:.75rem;vertical-align:middle">
    ↻ Run Ingest
  </button>
</h2>
<div id="ingest-output" style="font-size:.8rem;margin-top:.25rem"></div>

<form class="filters" method="get" action="/">
    <select name="source" onchange="this.form.submit()">
        <option value="">All sources</option>
        {% for s in sources %}
        <option value="{{ s }}" {% if source == s %}selected{% endif %}>{{ s }}</option>
        {% endfor %}
    </select>
    <select name="project" onchange="this.form.submit()">
        <option value="">All projects</option>
        {% for p in projects %}
        <option value="{{ p }}" {% if project == p %}selected{% endif %}>{{ p }}</option>
        {% endfor %}
    </select>
    <select name="days" onchange="this.form.submit()">
        {% for d in [1, 3, 7, 14, 30, 90] %}
        <option value="{{ d }}" {% if days == d %}selected{% endif %}>Last {{ d }} days</option>
        {% endfor %}
    </select>
</form>

<div id="events">
    {% include "_events.html" %}
</div>
{% endblock %}
